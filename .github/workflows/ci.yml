name: CI

on:
  push:
    branches:
      - main
      - 'agents/**'
  pull_request:
    branches:
      - main
      - 'agents/**'

jobs:
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v2
        with:
          version: '0.4.11'

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Sync dependencies
        working-directory: packages/agent
        run: uv sync --extra dev

      - name: Run pytest
        working-directory: packages/agent
        run: uv run pytest -v --tb=short

  lint-backend:
    name: Backend Lint (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v2
        with:
          version: '0.4.11'

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Sync dependencies
        working-directory: packages/agent
        run: uv sync --extra dev

      - name: Lint with ruff
        working-directory: packages/agent
        run: uv run ruff check agent --fix-only --exit-zero

  test-extension:
    name: Extension Type Check & Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['18', '20']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 11

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        working-directory: packages/extension
        run: pnpm exec tsc --noEmit

      - name: Build extension
        working-directory: packages/extension
        run: pnpm run build

  summary:
    name: CI Summary
    if: always()
    needs: [test-backend, lint-backend, test-extension]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.test-backend.result }}" != "success" ]; then
            echo "❌ Backend tests failed"
            exit 1
          fi
          if [ "${{ needs.lint-backend.result }}" != "success" ]; then
            echo "❌ Backend linting failed"
            exit 1
          fi
          if [ "${{ needs.test-extension.result }}" != "success" ]; then
            echo "❌ Extension build failed"
            exit 1
          fi
          echo "✅ All CI checks passed"
