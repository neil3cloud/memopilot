[project]
name = "memopilot-agent"
version = "0.1.0"
description = "MemoPilot Python Agent Backend"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.109.0",
    "uvicorn[standard]>=0.27.0",
    "pydantic>=2.5.0",
    "aiosqlite>=0.19.0",
    "httpx>=0.26.0",
    "detect-secrets>=1.5.0",
    "pillow>=11.0.0",
    "openpyxl>=3.1.5",
    "pdfplumber>=0.11.4",
    "python-docx>=1.1.2",
    "python-pptx>=1.0.2",
    "pytesseract>=0.3.10",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
dev = [
    "httpx>=0.28.1",
    "pytest>=9.0.3",
    "pytest-asyncio>=1.4.0",
    "ruff>=0.2.0",
]
watch = ["watchdog>=4.0.0"]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.hatch.build.targets.wheel]
packages = ["agent"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
