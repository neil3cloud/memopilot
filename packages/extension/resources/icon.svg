<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- antenna -->
  <line x1="12" y1="2" x2="12" y2="5"/>
  <circle cx="12" cy="2" r="1" fill="currentColor" stroke="none"/>
  <!-- head -->
  <rect x="4" y="5" width="16" height="12" rx="4" ry="4"/>
  <!-- eyes -->
  <circle cx="9" cy="11" r="1.5" fill="currentColor" stroke="none"/>
  <circle cx="15" cy="11" r="1.5" fill="currentColor" stroke="none"/>
  <!-- mouth -->
  <path d="M9 14.5h6" stroke-width="1.2"/>
  <!-- ears -->
  <rect x="1" y="9" width="2" height="4" rx="1" fill="currentColor" stroke="none"/>
  <rect x="21" y="9" width="2" height="4" rx="1" fill="currentColor" stroke="none"/>
  <!-- neck/body hint -->
  <path d="M9 17v2h6v-2"/>
</svg>
